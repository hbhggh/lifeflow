// ——————— Sync Client (outbox → /api/session → GitHub) ———————
// finishRun 产生的 session + entries 先入 localStorage outbox，再异步 POST /api/session；
// 网关端（CF Pages Function）代签 fine-grained PAT 写 data.json。断网/Function 故障时
// outbox 保留到 localStorage，下次打开或手动点同步 chip 再推。
const SyncClient = (function () {
  const OUTBOX_KEY   = 'lifeflow_outbox_v1';
  const STATE_KEY    = 'lifeflow_sync_state_v1'; // { st: 'synced'|'pending'|'syncing'|'error'|'offline', msg, ts }
  const ENDPOINT     = '/api/session';
  const RETRY_MS     = 30000;   // idle 背景重试节奏
  const ONLINE_DELAY = 800;     // 网络恢复后稍等再冲一次
  let pushing = false;
  let bgTimer = null;
  let chipEl  = null;

  function loadOutbox() {
    try {
      const o = JSON.parse(localStorage.getItem(OUTBOX_KEY) || 'null');
      if (o && Array.isArray(o.sessions) && Array.isArray(o.entries)) return o;
    } catch (e) {}
    return { sessions: [], entries: [] };
  }
  function saveOutbox(o) {
    try { localStorage.setItem(OUTBOX_KEY, JSON.stringify(o)); } catch (e) {}
  }
  function loadState() {
    try { return JSON.parse(localStorage.getItem(STATE_KEY) || 'null') || {}; }
    catch (e) { return {}; }
  }
  function saveState(st, msg) {
    try { localStorage.setItem(STATE_KEY, JSON.stringify({ st, msg: msg || null, ts: Date.now() })); }
    catch (e) {}
    renderChip();
  }

  function hasPending() {
    const o = loadOutbox();
    return (o.sessions.length + o.entries.length) > 0;
  }
  function pendingCount() {
    const o = loadOutbox();
    return o.sessions.length + o.entries.length;
  }
  function getOutbox() { return loadOutbox(); }

  function enqueue(sessions, entries) {
    const o = loadOutbox();
    const haveS = new Set(o.sessions.map(s => s && s.id).filter(Boolean));
    const haveE = new Set(o.entries.map(e => e && e.id).filter(Boolean));
    (sessions || []).forEach(s => { if (s && s.id && !haveS.has(s.id)) { o.sessions.push(s); haveS.add(s.id); } });
    (entries || []).forEach(e => { if (e && e.id && !haveE.has(e.id)) { o.entries.push(e); haveE.add(e.id); } });
    saveOutbox(o);
    saveState('pending');
  }

  function renderChip() {
    chipEl = chipEl || document.getElementById('sync-chip');
    if (!chipEl) return;
    chipEl.classList.remove('synced', 'syncing', 'pending', 'error', 'offline');
    if (typeof navigator !== 'undefined' && navigator.onLine === false) {
      chipEl.classList.add('offline');
      chipEl.textContent = '⊘ 离线';
      chipEl.title = '网络断开 · 恢复后自动重试';
      return;
    }
    if (pushing) {
      chipEl.classList.add('syncing');
      chipEl.textContent = '同步中';
      chipEl.title = '正在推送到 GitHub…';
      return;
    }
    const st = loadState();
    const n = pendingCount();
    if (st.st === 'error' && n > 0) {
      chipEl.classList.add('error');
      chipEl.textContent = `⚠ ${n} 待同步`;
      chipEl.title = `上次失败：${st.msg || '未知错误'} · 点击重试`;
      return;
    }
    if (n > 0) {
      chipEl.classList.add('pending');
      chipEl.textContent = `○ ${n} 待同步`;
      chipEl.title = '点击立即同步';
      return;
    }
    chipEl.classList.add('synced');
    chipEl.textContent = '● 已同步';
    chipEl.title = st.ts ? `最近同步：${new Date(st.ts).toLocaleTimeString()}` : '';
  }

  async function push() {
    if (pushing) return { ok: true, noop: true };
    const o = loadOutbox();
    if (o.sessions.length === 0 && o.entries.length === 0) {
      saveState('synced');
      return { ok: true, noop: true };
    }
    pushing = true; renderChip();
    try {
      const resp = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessions: o.sessions, entries: o.entries }),
        credentials: 'include' // carry CF Access cookie
      });
      if (!resp.ok) {
        const txt = await resp.text().catch(() => '');
        throw new Error(`HTTP ${resp.status}${txt ? ' · ' + txt.slice(0, 160) : ''}`);
      }
      const res = await resp.json().catch(() => ({ ok: false, error: 'non-JSON response' }));
      if (!res.ok) throw new Error(res.error || 'sync failed');
      // Success: clear outbox (server already idempotently merged what we sent)
      saveOutbox({ sessions: [], entries: [] });
      saveState('synced');
      return res;
    } catch (e) {
      saveState('error', String(e && e.message || e));
      return { ok: false, error: String(e && e.message || e) };
    } finally {
      pushing = false;
      renderChip();
    }
  }

  // Merge the outbox into a data object in-place so UI can show un-synced stuff
  // immediately on page load (before /api/session comes back).
  function mergeIntoData(data) {
    if (!data) return;
    const o = loadOutbox();
    if (o.sessions.length === 0 && o.entries.length === 0) return;
    data.today = data.today || {};
    data.today.focus_sessions = Array.isArray(data.today.focus_sessions) ? data.today.focus_sessions : [];
    data.today.entries        = Array.isArray(data.today.entries)        ? data.today.entries        : [];
    const haveS = new Set(data.today.focus_sessions.map(s => s && s.id).filter(Boolean));
    const haveE = new Set(data.today.entries.map(e => e && e.id).filter(Boolean));
    o.sessions.forEach(s => { if (s && s.id && !haveS.has(s.id)) data.today.focus_sessions.push(s); });
    o.entries.forEach(e => {
      if (e && e.id && !haveE.has(e.id)) {
        data.today.entries.push(e);
        data.today.points = (data.today.points || 0) + (Number(e.points) || 0);
      }
    });
  }

  function init() {
    chipEl = document.getElementById('sync-chip');
    renderChip();
    if (chipEl) {
      chipEl.addEventListener('click', () => { push(); });
      chipEl.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); push(); }
      });
    }
    // online/offline pulse
    if (typeof window !== 'undefined') {
      window.addEventListener('online',  () => { renderChip(); setTimeout(push, ONLINE_DELAY); });
      window.addEventListener('offline', () => { renderChip(); });
    }
    // startup: if anything is pending, try once immediately.
    if (hasPending()) setTimeout(push, 120);
    // idle retry while pending
    if (bgTimer) clearInterval(bgTimer);
    bgTimer = setInterval(() => {
      if (!pushing && hasPending() && (typeof navigator === 'undefined' || navigator.onLine !== false)) {
        push();
      }
    }, RETRY_MS);
  }

  return { init, enqueue, push, renderChip, hasPending, pendingCount, getOutbox, mergeIntoData };
})();

// ——————— Focus Timer (floating) ———————
const FocusTimer = (function () {
  const LS_KEY = 'lifeflow_focus_timer_v1';
  let state = null;   // { mode, plannedSec, startedAt, preClarity, projectId, note, running, paused, pausedAt, totalPausedSec }
  let tickHandle = null;
  let data = null, cfg = null;

  function save() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state || null)); } catch(e){}
  }
  function load() {
    try {
      const s = localStorage.getItem(LS_KEY);
      if (s) state = JSON.parse(s);
    } catch(e) { state = null; }
  }

  function fmtHMS(sec) {
    sec = Math.max(0, Math.floor(sec));
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    return (h > 0 ? String(h).padStart(2,'0') + ':' : '') +
           String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  function fmtMMSS(sec) {
    sec = Math.max(0, Math.floor(sec));
    const m = Math.floor(sec / 60), s = sec % 60;
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  function nowIso() { return new Date().toISOString(); }

  function getLiveSegment() {
    if (!state || !state.running) return null;
    const d = new Date(state.startedAt);
    const startMin = d.getHours() * 60 + d.getMinutes() + d.getSeconds() / 60;
    return { startMin, clarity: state.preClarity };
  }

  function elapsedSec() {
    if (!state || !state.startedAt) return 0;
    const raw = (Date.now() - new Date(state.startedAt).getTime()) / 1000;
    const accumulated = state.totalPausedSec || 0;
    // if currently paused, also subtract the in-progress pause window so
    // the displayed elapsed freezes while the user is paused.
    const inPauseNow = (state.paused && state.pausedAt)
      ? (Date.now() - new Date(state.pausedAt).getTime()) / 1000
      : 0;
    return Math.max(0, raw - accumulated - inPauseNow);
  }
  function remainingSec() {
    if (!state || state.mode !== 'countdown' || !state.plannedSec) return 0;
    return Math.max(0, state.plannedSec - elapsedSec());
  }

  function openPanel() {
    document.getElementById('ft-panel').classList.add('open');
    renderPanel();
  }
  function closePanel() {
    document.getElementById('ft-panel').classList.remove('open');
  }
  function toggleFabLabel() {
    const fab = document.getElementById('ft-fab');
    if (!fab) return;
    const label = document.getElementById('ft-fab-label');
    const elp = document.getElementById('ft-fab-elapsed');
    if (state && state.running) {
      fab.classList.add('running');
      fab.classList.toggle('paused', !!state.paused);
      fab.setAttribute('aria-label', state.paused ? '专注已暂停' : '专注中');
      if (label) label.style.display = 'none';
      if (elp) elp.style.display = 'none';
      renderFabRunningDOM(fab);
      updateFabRunning(fab);
    } else {
      fab.classList.remove('running');
      fab.classList.remove('paused');
      fab.setAttribute('aria-label', '专注计时器');
      if (label) label.style.display = '';
      if (elp) elp.style.display = 'none';
    }
  }

  // Inject the running-state DOM (ring + center + ctrl) into the FAB once.
  // Subsequent renders reuse the existing nodes and mutate attributes only.
  function renderFabRunningDOM(fab) {
    if (fab.querySelector('.ft-fab-ring')) return;
    const r = 50;
    const C = 2 * Math.PI * r;
    const frag = document.createElement('div');
    frag.innerHTML = `
      <svg class="ft-fab-ring" viewBox="0 0 112 112" aria-hidden="true">
        <circle class="track" cx="56" cy="56" r="${r}"></circle>
        <circle class="prog"  cx="56" cy="56" r="${r}"
          stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${C.toFixed(2)}"></circle>
        <circle class="head" cx="${(56 + r).toFixed(2)}" cy="56" r="4"></circle>
      </svg>
      <div class="ft-fab-center">
        <span class="time">00:00</span>
        <span class="sub">专注中</span>
      </div>
      <div class="ft-fab-ctrl" role="group" aria-label="专注控制">
        <button type="button" data-act="fab-pause" aria-label="暂停" title="暂停">⏸</button>
        <button type="button" data-act="fab-finish" class="danger" aria-label="结束并填写" title="结束">⏹</button>
      </div>
    `;
    while (frag.firstElementChild) fab.appendChild(frag.firstElementChild);
  }

  // Refresh FAB running visuals: arc, head, time, sub, pause-button icon.
  function updateFabRunning(fab) {
    const ring = fab.querySelector('.ft-fab-ring');
    if (!ring) return;
    const prog = ring.querySelector('.prog');
    const head = ring.querySelector('.head');
    const timeEl = fab.querySelector('.ft-fab-center .time');
    const subEl  = fab.querySelector('.ft-fab-center .sub');
    const pauseBtn = fab.querySelector('[data-act="fab-pause"]');

    const tier = tierFor(state.preClarity);
    if (prog) prog.style.stroke = tier.color;
    if (head) head.style.fill = tier.color;

    // Target duration for progress math:
    //  countdown → plannedSec; stopwatch → cfg.focus_timer.stopwatch_loop_sec (default 25 min).
    const cfgFT = (window.__CFG__ && window.__CFG__.focus_timer) || {};
    const loopSec = Number(cfgFT.stopwatch_loop_sec) > 0 ? Number(cfgFT.stopwatch_loop_sec) : 1500;
    const target = (state.mode === 'countdown' && state.plannedSec) ? state.plannedSec : loopSec;

    const e = elapsedSec();
    const progress = target > 0 ? (e / target - Math.floor(e / target)) : 0; // [0, 1)
    const r = 50;
    const C = 2 * Math.PI * r;
    if (prog) prog.style.strokeDashoffset = (C * (1 - progress)).toFixed(2);
    if (head) {
      const theta = progress * 2 * Math.PI;
      head.setAttribute('cx', (56 + r * Math.cos(theta)).toFixed(2));
      head.setAttribute('cy', (56 + r * Math.sin(theta)).toFixed(2));
    }

    // center time: MM:SS, or H:MM:SS once ≥ 1h
    const left = (state.mode === 'countdown' && state.plannedSec)
      ? Math.max(0, state.plannedSec - e)
      : e;
    if (timeEl) timeEl.textContent = left >= 3600 ? fmtHMS(left) : fmtMMSS(left);

    // sub: paused > project name > default
    let subText = '专注中';
    if (state.paused) subText = '已暂停';
    else if (state.projectId && window.__DATA__ && Array.isArray(window.__DATA__.projects)) {
      const p = window.__DATA__.projects.find(x => x.id === state.projectId);
      if (p && p.name) subText = p.name;
    }
    if (subEl) subEl.textContent = subText;

    // pause button: ⏸ ↔ ▶
    if (pauseBtn) {
      if (state.paused) {
        pauseBtn.textContent = '▶';
        pauseBtn.setAttribute('aria-label', '继续');
        pauseBtn.setAttribute('title', '继续');
      } else {
        pauseBtn.textContent = '⏸';
        pauseBtn.setAttribute('aria-label', '暂停');
        pauseBtn.setAttribute('title', '暂停');
      }
    }
  }

  function renderPanel() {
    const panel = document.getElementById('ft-panel');
    if (!panel.classList.contains('open')) return;
    const projects = (data && data.projects) || [];
    const selectedPid = (state && state.setupProjectId) || '';
    const projOptions = [`<option value="" ${selectedPid===''?'selected':''}>— 不挂项目 (可结束后再决定) —</option>`]
      .concat(projects.map(p => `<option value="${p.id}" ${selectedPid===p.id?'selected':''}>${escapeHtml(p.name)}</option>`))
      .join('');

    if (!state || !state.running) {
      // ========== SETUP STATE ==========
      // Unified: setupMinutes === 0 → stopwatch; > 0 → countdown.
      // Ring is draggable — drag stroke to set minutes (full circle = 60 min).
      state = state || {};
      if (state.setupMinutes == null) state.setupMinutes = 45;
      if (state.setupClarity == null) state.setupClarity = 70; // default "较清晰"
      if (state.setupProjectId == null) state.setupProjectId = '';
      if (state.setupNote == null) state.setupNote = '';

      const minutes = state.setupMinutes;
      const isCountdown = minutes > 0;
      const tier = tierFor(state.setupClarity);
      const R = 80, C = 2 * Math.PI * R;
      const RING_FULL_MIN = 60;
      // Per-loop arc fill: wraps every 60 min so the 2nd+ lap animates from near-zero again.
      const ringFrac = isCountdown ? ((((minutes - 1) % RING_FULL_MIN) + 1) / RING_FULL_MIN) : 0;
      const dashOffset = C * (1 - ringFrac);
      const ringDisplay = isCountdown ? fmtMMSS(minutes * 60) : '00:00';
      const lap = isCountdown ? Math.ceil(minutes / RING_FULL_MIN) : 0;
      const ringSub = !isCountdown
        ? '拖环设时长 · 或按开始计时'
        : (lap > 1 ? `计划时长 · 第 ${lap} 圈` : '计划时长');

      const ctaText = isCountdown
        ? `开始 <span class="cta-sub">· ${minutes} min</span>`
        : `开始计时`;

      // handle/head use visual-θ directly: SVG y-down + CSS rotate(-90deg) on <svg>
      // aligns SVG's CCW-from-3-o'clock with the viewer's CW-from-12-o'clock, so no
      // extra -π/2 shift is needed (the old offset was a double-correction bug).
      const handleTheta = ringFrac * 2 * Math.PI;
      const handleX = 90 + R * Math.cos(handleTheta);
      const handleY = 90 + R * Math.sin(handleTheta);

      // tier tick labels (for gradient bar)
      const tiers = [...getTiers()].reverse(); // low → high
      const activeTierId = tier.id;
      const tierTicksHtml = tiers.map(t =>
        `<span class="${t.id===activeTierId?'active':''}">${t.label}</span>`
      ).join('');

      const nameVal = state.setupNote || '';
      const nameHtml = nameVal
        ? `<div class="name-slot" data-act="name-edit" role="button" tabindex="0" aria-label="编辑本次专注的命名 · 当前 ${escapeHtml(nameVal)}" title="点击编辑">${escapeHtml(nameVal)}</div>`
        : `<div class="name-slot empty" data-act="name-edit" role="button" tabindex="0" aria-label="命名这次专注" title="点击命名这次专注">命名</div>`;

      panel.innerHTML = `
        <div class="ft-card">
        <div class="ft-head">
          <span class="t">专注计时</span>
          <button class="x" data-act="close">×</button>
        </div>
        <div class="ft-body">

          <div class="ft-ring-wrap">
            <div class="ft-ring setup ${!isCountdown?'breath':''} ${isCountdown?'draggable-on':'draggable-empty'}" id="ft-ring-setup" tabindex="0">
              <svg viewBox="0 0 180 180" aria-hidden="true">
                <circle class="track-c" cx="90" cy="90" r="${R}"></circle>
                <circle class="prog-c" cx="90" cy="90" r="${R}"
                  style="stroke:${tier.color}; stroke-dasharray:${C.toFixed(2)}; stroke-dashoffset:${dashOffset.toFixed(2)}"></circle>
                ${isCountdown ? `<circle class="handle" cx="${handleX.toFixed(2)}" cy="${handleY.toFixed(2)}" r="7" style="fill:${tier.color}"></circle>` : ''}
              </svg>
              ${nameHtml}
              <div class="center">
                <span class="big" id="ft-ring-display">${ringDisplay}</span>
                <span class="sub">${ringSub}</span>
              </div>
            </div>
          </div>

          <div class="ft-grid">
            <div class="ft-field span-2">
              <div class="label"><span>大脑清晰度</span><span class="val" id="ft-clarity-val">${tier.label} · ${state.setupClarity}</span></div>
              <div class="ft-clarity-gradient" id="ft-clarity-bar">
                <div class="track" id="ft-clarity-track">
                  <div class="thumb" id="ft-clarity-thumb" style="--c:${tier.color}; left:${state.setupClarity}%"></div>
                </div>
                <div class="ticks">${tierTicksHtml}</div>
              </div>
            </div>

            <div class="ft-field span-2">
              <div class="label"><span>挂到项目</span></div>
              <select id="ft-project">${projOptions}</select>
            </div>
          </div>

          <div class="ft-cta-wrap">
            <button class="ft-cta" data-act="start">${ctaText}</button>
          </div>
        </div>
        </div>
      `;
    } else {
      // ========== RUNNING STATE ==========
      const mode = state.mode;
      const left = mode === 'countdown' ? remainingSec() : elapsedSec();
      const subLabel = mode === 'countdown' ? '倒计时剩余' : '已专注';
      const tier = tierFor(state.preClarity);
      const R = 80;
      const C = 2 * Math.PI * R;
      // progress = elapsed / planned (accumulating), so arc grows 0 → full and the
      // head cap dot rides the arc tip, starting from 12 o'clock CW.
      let progress = 0;
      let ringMode = 'none';
      if (mode === 'countdown' && state.plannedSec) {
        progress = Math.max(0, Math.min(1, elapsedSec() / state.plannedSec));
        ringMode = 'countdown';
      } else if (mode === 'stopwatch') {
        progress = 1; // no plan — let the breath animation carry a full ring
        ringMode = 'breath';
      }
      const dashOffset = C * (1 - progress);
      const headTheta = progress * 2 * Math.PI;
      const headX = 90 + R * Math.cos(headTheta);
      const headY = 90 + R * Math.sin(headTheta);
      const showHead = ringMode === 'countdown';

      const projName = state.projectId
        ? (projects.find(p=>p.id===state.projectId)||{}).name
        : null;

      // ---- insights UI ----
      state.insights = state.insights || [];
      const nameShow = state.note || '';
      const nameHtmlRun = nameShow
        ? `<div class="name-slot" data-act="name-edit" role="button" tabindex="0" aria-label="编辑本次专注的命名 · 当前 ${escapeHtml(nameShow)}" title="点击编辑">${escapeHtml(nameShow)}</div>`
        : `<div class="name-slot empty" data-act="name-edit" role="button" tabindex="0" aria-label="命名这次专注" title="点击命名这次专注">命名</div>`;

      const insightsListHtml = state.insights.length > 0
        ? `<div class="items">${state.insights.map((it, i) => {
            const proj = projects.find(p => p.id === it.projectId);
            const pName = proj ? proj.name : '无项目';
            return `<div class="item" data-idx="${i}">
              <span class="txt">${escapeHtml(it.text)}</span>
              <span class="proj">${escapeHtml(pName)}</span>
              <span class="pts">+${it.points}</span>
              <button class="del" data-act="insight-del" data-idx="${i}" aria-label="删除">×</button>
            </div>`;
          }).join('')}</div>`
        : `<div class="empty">还没有记录 · 心流中任何心得感悟都可以随手记下</div>`;

      const addingInsight = state.addingInsight === true;
      const insightProjOpts = ['<option value="">— 无项目 —</option>']
        .concat(projects.map(p => {
          const sel = (state._insightDraft && state._insightDraft.projectId === p.id)
            || (!state._insightDraft && state.projectId === p.id);
          return `<option value="${p.id}" ${sel?'selected':''}>${escapeHtml(p.name)}</option>`;
        })).join('');
      const draftText = (state._insightDraft && state._insightDraft.text) || '';
      const draftPts = (state._insightDraft && state._insightDraft.points != null) ? state._insightDraft.points : 15;

      const addFormHtml = addingInsight
        ? `<div class="add-form">
             <textarea id="ft-ins-text" placeholder="比如：总结出 X 的 3 步流程 / 发现 Y 的瓶颈在 Z…" autofocus>${escapeHtml(draftText)}</textarea>
             <div class="row2">
               <input type="number" id="ft-ins-pts" min="1" max="100" step="1" value="${draftPts}" aria-label="积分" />
               <select id="ft-ins-proj">${insightProjOpts}</select>
             </div>
             <div class="row3">
               <button class="cancel" data-act="insight-cancel">取消</button>
               <button class="save" data-act="insight-save">记下</button>
             </div>
           </div>`
        : `<button class="add-btn" data-act="insight-add">+ 记一条心得</button>`;

      panel.innerHTML = `
        <div class="ft-card">
        <div class="ft-head">
          <span class="t">专注中</span>
          <button class="x" data-act="close">×</button>
        </div>
        <div class="ft-body">
          <div class="ft-ring-wrap">
            <div class="ft-ring ${ringMode==='breath'?'breath':''}">
              <svg viewBox="0 0 180 180" aria-hidden="true">
                <circle class="track-c" cx="90" cy="90" r="${R}"></circle>
                <circle class="prog-c" cx="90" cy="90" r="${R}"
                  style="stroke:${tier.color}; stroke-dasharray:${C.toFixed(2)}; stroke-dashoffset:${dashOffset.toFixed(2)}"></circle>
                ${showHead ? `<circle class="ft-ring-head" cx="${headX.toFixed(2)}" cy="${headY.toFixed(2)}" r="5" style="fill:${tier.color}"></circle>` : ''}
              </svg>
              ${nameHtmlRun}
              <div class="center">
                <span class="big" id="ft-big">${fmtHMS(left)}</span>
                <span class="sub">${subLabel}</span>
              </div>
            </div>
          </div>
          <div class="ft-meta-strip">
            <span><span class="k">模式</span><b>${mode==='countdown'?'倒计时 '+Math.round(state.plannedSec/60)+'m':'正计时'}</b></span>
            <span class="sep">·</span>
            <span><span class="k">状态</span><span class="ft-clarity-chip" style="--c:${tier.color}">${tier.label}</span></span>
            ${projName ? `<span class="sep">·</span><span><span class="k">项目</span><b>${escapeHtml(projName)}</b></span>` : ''}
          </div>

          <div class="ft-insights">
            <div class="hdr">
              <span class="t">本次心得</span>
              <span class="count">${state.insights.length} 条 · 累计 +${state.insights.reduce((s,i)=>s+i.points,0)}</span>
            </div>
            ${insightsListHtml}
            ${addFormHtml}
          </div>

          <div class="ft-cta-wrap">
            <button class="ft-btn danger" data-act="cancel">放弃</button>
            <button class="ft-cta" data-act="finish">结束并填写</button>
          </div>
        </div>
        </div>
      `;
    }
    // after panel HTML is in place, install ring-drag handlers if we're in setup
    if (!state || !state.running) {
      installRingDrag(document.getElementById('ft-panel'));
      installClarityBar(document.getElementById('ft-panel'));
    }
  }

  function onPanelClick(ev) {
    // handle name-slot edit (both setup & running)
    const nameSlot = ev.target.closest('.name-slot');
    if (nameSlot && !nameSlot.classList.contains('editing')) {
      beginNameEdit(nameSlot);
      return;
    }

    const btn = ev.target.closest('[data-act]');
    if (!btn) return;
    const act = btn.dataset.act;
    if (act === 'close') return closePanel();
    if (act === 'start') return startRun();
    if (act === 'cancel') return cancelRun();
    if (act === 'finish') return finishRun();
    if (act === 'insight-add') {
      state.addingInsight = true;
      state._insightDraft = { text: '', points: 15, projectId: state.projectId || '' };
      renderPanel();
      const ta = document.getElementById('ft-ins-text');
      if (ta) ta.focus();
      return;
    }
    if (act === 'insight-cancel') {
      state.addingInsight = false;
      state._insightDraft = null;
      renderPanel();
      return;
    }
    if (act === 'insight-save') {
      const ta = document.getElementById('ft-ins-text');
      const pts = document.getElementById('ft-ins-pts');
      const pr = document.getElementById('ft-ins-proj');
      const text = (ta && ta.value || '').trim();
      if (!text) { if (ta) ta.focus(); return; }
      const points = Math.max(1, Math.min(100, Number(pts && pts.value) || 15));
      const projectId = (pr && pr.value) || null;
      state.insights = state.insights || [];
      state.insights.push({
        id: 'i_' + Date.now().toString(36),
        text, points, projectId,
        at: nowIso()
      });
      state.addingInsight = false;
      state._insightDraft = null;
      save();
      renderPanel();
      return;
    }
    if (act === 'insight-del') {
      const idx = Number(btn.dataset.idx);
      if (!isNaN(idx) && state.insights && state.insights[idx]) {
        state.insights.splice(idx, 1);
        save();
        renderPanel();
      }
      return;
    }
  }

  // Inline edit of the ring-center "name-slot" (session title)
  function beginNameEdit(slot) {
    state = state || {};
    const current = state.running ? (state.note || '') : (state.setupNote || '');
    slot.classList.remove('empty');
    slot.classList.add('editing');
    slot.innerHTML = `<input type="text" maxlength="40" value="${escapeHtml(current)}" placeholder="命名…" />`;
    const inp = slot.querySelector('input');
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
    const commit = () => {
      const v = inp.value.trim();
      if (state.running) state.note = v;
      else state.setupNote = v;
      save();
      renderPanel();
    };
    const cancel = () => renderPanel();
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });
    inp.addEventListener('blur', commit);
    // stop click from bubbling to close handler
    slot.addEventListener('click', e => e.stopPropagation());
  }

  // Clarity gradient bar — click/drag to set 0..100
  function installClarityBar(panel) {
    const bar = panel.querySelector('#ft-clarity-bar');
    if (!bar) return;
    const track = bar.querySelector('.track');

    function valFromEvent(ev) {
      const r = track.getBoundingClientRect();
      const pt = ev.touches && ev.touches[0] ? ev.touches[0] : ev;
      const x = pt.clientX - r.left;
      return Math.max(0, Math.min(100, Math.round((x / r.width) * 100)));
    }
    function updateVisual(v) {
      state = state || {};
      state.setupClarity = v;
      const tier = tierFor(v);
      const thumb = bar.querySelector('#ft-clarity-thumb');
      if (thumb) {
        thumb.style.left = v + '%';
        thumb.style.setProperty('--c', tier.color);
      }
      const valEl = bar.querySelector('#ft-clarity-val') || panel.querySelector('#ft-clarity-val');
      if (valEl) valEl.textContent = tier.label + ' · ' + v;
      // tick active
      bar.querySelectorAll('.ticks span').forEach(el => el.classList.remove('active'));
      const tiers = [...getTiers()].reverse();
      const idx = tiers.findIndex(t => t.id === tier.id);
      const tickEls = bar.querySelectorAll('.ticks span');
      if (tickEls[idx]) tickEls[idx].classList.add('active');
      // also update ring stroke + handle color live (in setup)
      const ring = document.getElementById('ft-ring-setup');
      if (ring) {
        const prog = ring.querySelector('.prog-c');
        if (prog) prog.style.stroke = tier.color;
        const handle = ring.querySelector('.handle');
        if (handle) handle.style.fill = tier.color;
      }
    }
    function onMove(ev) {
      ev.preventDefault();
      updateVisual(valFromEvent(ev));
    }
    function onUp() {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchend', onUp);
      save();
    }
    function onDown(ev) {
      ev.preventDefault();
      updateVisual(valFromEvent(ev));
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('mouseup', onUp);
      window.addEventListener('touchend', onUp);
    }
    track.addEventListener('mousedown', onDown);
    track.addEventListener('touchstart', onDown, { passive: false });
  }

  function onPanelInput(ev) {
    const id = ev.target.id;
    if (id === 'ft-project') {
      state = state || {};
      state.setupProjectId = ev.target.value;
      return;
    }
  }

  // Ring drag — sets setupMinutes by angle around ring center.
  // Each full revolution adds RING_FULL_MIN (60) min; cap at RING_MAX_MIN (480 = 8h).
  // rAF-batched; handle follows raw theta so it tracks the finger without per-minute snap.
  function installRingDrag(panel) {
    const ring = panel.querySelector('#ft-ring-setup');
    if (!ring) return;
    const RING_FULL_MIN = 60;
    const RING_MAX_MIN = 480;

    let dragLoops = Math.floor(((state && state.setupMinutes) || 0) / RING_FULL_MIN);
    let lastTheta = null;
    let pendingTheta = null;
    let rafPending = false;

    function thetaFromEvent(ev) {
      const r = document.getElementById('ft-ring-setup');
      if (!r) return null;
      const rect = r.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const pt = (ev.touches && ev.touches[0]) ? ev.touches[0]
               : (ev.changedTouches && ev.changedTouches[0]) ? ev.changedTouches[0]
               : ev;
      const dx = pt.clientX - cx;
      const dy = pt.clientY - cy;
      // CW from 12 o'clock, in [0, 2π)
      let theta = Math.atan2(dx, -dy);
      if (theta < 0) theta += 2 * Math.PI;
      return theta;
    }

    // Detect crossing the 0 / 2π seam: |Δθ| > π means wrapped around → ± one loop.
    function updateLoopsFromTheta(theta) {
      if (lastTheta != null) {
        const delta = theta - lastTheta;
        if (delta < -Math.PI) dragLoops += 1;
        else if (delta > Math.PI) dragLoops -= 1;
      }
      lastTheta = theta;
      const maxLoops = Math.floor(RING_MAX_MIN / RING_FULL_MIN); // 8
      if (dragLoops < 0) dragLoops = 0;
      if (dragLoops > maxLoops) dragLoops = maxLoops;
    }

    function minutesAtTheta(theta) {
      const frac = theta / (2 * Math.PI);
      let m = dragLoops * RING_FULL_MIN + Math.round(frac * RING_FULL_MIN);
      if (m < 0) m = 0;
      if (m > RING_MAX_MIN) m = RING_MAX_MIN;
      return m;
    }

    // handleThetaOverride: when drag-driven, pass raw finger theta so the knob
    // tracks the pointer exactly (no minute-level snap).
    function updateRingVisual(minutes, handleThetaOverride) {
      state = state || {};
      state.setupMinutes = minutes;
      const r = document.getElementById('ft-ring-setup');
      if (!r) return;
      const R = 80, C = 2 * Math.PI * R;

      // Per-loop arc fill: at 60m arc is full; at 61m it wraps back near zero.
      // Visual cue for "I've passed a full lap".
      let arcFrac = 0;
      if (minutes > 0) {
        const inner = ((minutes - 1) % RING_FULL_MIN) + 1; // 1..60, never 0 for >0
        arcFrac = inner / RING_FULL_MIN;
      }
      const prog = r.querySelector('.prog-c');
      if (prog) prog.style.strokeDashoffset = (C * (1 - arcFrac)).toFixed(2);

      let handle = r.querySelector('.handle');
      if (minutes > 0) {
        let theta;
        if (handleThetaOverride != null) {
          theta = handleThetaOverride;
        } else {
          const innerFrac = (((minutes - 1) % RING_FULL_MIN) + 1) / RING_FULL_MIN;
          theta = innerFrac * 2 * Math.PI;
        }
        // visual-θ maps 1:1 to SVG atan2 coords (see note on handleTheta in render).
        const hx = 90 + R * Math.cos(theta);
        const hy = 90 + R * Math.sin(theta);
        if (!handle) {
          handle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          handle.setAttribute('class', 'handle');
          handle.setAttribute('r', '7');
          r.querySelector('svg').appendChild(handle);
        }
        handle.setAttribute('cx', hx.toFixed(2));
        handle.setAttribute('cy', hy.toFixed(2));
        const tier = tierFor(state.setupClarity);
        handle.style.fill = tier.color;
      } else if (handle) {
        handle.remove();
      }

      r.classList.toggle('breath', minutes === 0);
      r.classList.toggle('draggable-on', minutes > 0);
      r.classList.toggle('draggable-empty', minutes === 0);

      const big = document.getElementById('ft-ring-display');
      if (big) big.textContent = minutes > 0 ? fmtMMSS(minutes * 60) : '00:00';
      const sub = r.querySelector('.center .sub');
      if (sub) {
        if (minutes === 0) sub.textContent = '拖环设时长 · 或按开始计时';
        else {
          const lap = Math.ceil(minutes / RING_FULL_MIN);
          sub.textContent = lap > 1 ? `计划时长 · 第 ${lap} 圈` : '计划时长';
        }
      }
    }

    function flushRaf() {
      rafPending = false;
      if (pendingTheta == null) return;
      const theta = pendingTheta;
      pendingTheta = null;
      updateLoopsFromTheta(theta);
      const minutes = minutesAtTheta(theta);
      updateRingVisual(minutes, theta);
    }

    function onMove(ev) {
      if (ev.cancelable) ev.preventDefault();
      const theta = thetaFromEvent(ev);
      if (theta == null) return;
      pendingTheta = theta;
      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(flushRaf);
      }
    }

    function onUp() {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchend', onUp);
      const r = document.getElementById('ft-ring-setup');
      if (r) r.classList.remove('dragging');
      lastTheta = null;
      pendingTheta = null;
      rafPending = false;
      // full rerender on release — syncs chip active states, CTA text, "快捷时长" label
      renderPanel();
      installRingDrag(document.getElementById('ft-panel'));
    }

    function onDown(ev) {
      // Don't hijack pointer-downs on interactive children (name slot, inputs,
      // buttons, [data-act]). Without this, their click bubbles to a panel that
      // has been re-rendered out from under them on mouseup → onPanelClick misses.
      if (ev.target && ev.target.closest &&
          ev.target.closest('.name-slot, button, input, textarea, select, [data-act]')) {
        return;
      }
      if (ev.cancelable) ev.preventDefault();
      ring.classList.add('dragging');
      dragLoops = Math.floor(((state && state.setupMinutes) || 0) / RING_FULL_MIN);
      const theta = thetaFromEvent(ev);
      if (theta != null) {
        lastTheta = theta; // anchor to down position so no spurious loop jump on first move
        const minutes = minutesAtTheta(theta);
        updateRingVisual(minutes, theta);
      }
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('mouseup', onUp);
      window.addEventListener('touchend', onUp);
    }

    function onDbl() {
      state = state || {};
      state.setupMinutes = 0;
      dragLoops = 0;
      renderPanel();
      installRingDrag(document.getElementById('ft-panel'));
    }

    ring.addEventListener('mousedown', onDown);
    ring.addEventListener('touchstart', onDown, { passive: false });
    ring.addEventListener('dblclick', onDbl);
  }

  function startRun() {
    // mode derived from setupMinutes: 0 → stopwatch, >0 → countdown
    const minutes = Number(state && state.setupMinutes != null ? state.setupMinutes : 0);
    const mode = minutes > 0 ? 'countdown' : 'stopwatch';
    let plannedMin = 0, plannedSec = null;
    if (mode === 'countdown') {
      plannedMin = minutes;
      plannedSec = plannedMin * 60;
    }
    const pre = Number(state.setupClarity != null ? state.setupClarity : 70);
    const projectId = state.setupProjectId || null;
    const note = state.setupNote || '';
    state = {
      mode,
      plannedMin: plannedMin || null,
      plannedSec,
      startedAt: nowIso(),
      preClarity: pre,
      projectId,
      note,
      running: true,
      paused: false,
      pausedAt: null,
      totalPausedSec: 0,
      insights: []
    };
    save();
    toggleFabLabel();
    renderPanel();
    updateFocusBar();
    if (tickHandle) clearInterval(tickHandle);
    tickHandle = setInterval(tick, 1000);
  }

  function tick() {
    if (!state || !state.running) { clearInterval(tickHandle); tickHandle = null; return; }
    toggleFabLabel();
    const panel = document.getElementById('ft-panel');
    if (panel.classList.contains('open')) {
      const big = panel.querySelector('#ft-big');
      if (big) {
        const left = state.mode === 'countdown' ? remainingSec() : elapsedSec();
        big.textContent = fmtHMS(left);
      }
      // update ring (arc grows with progress; head dot rides the arc tip)
      const progC = panel.querySelector('.ft-ring .prog-c');
      if (progC && state.mode === 'countdown' && state.plannedSec) {
        const R = 80, C = 2 * Math.PI * R;
        const progress = Math.max(0, Math.min(1, elapsedSec() / state.plannedSec));
        progC.style.strokeDashoffset = (C * (1 - progress)).toFixed(2);
        const head = panel.querySelector('.ft-ring .ft-ring-head');
        if (head) {
          const theta = progress * 2 * Math.PI;
          head.setAttribute('cx', (90 + R * Math.cos(theta)).toFixed(2));
          head.setAttribute('cy', (90 + R * Math.sin(theta)).toFixed(2));
        }
      }
      // update elapsed hint on countdown
      const hint = panel.querySelector('.ft-ring .hint');
      if (hint && state.mode === 'countdown' && state.plannedSec) {
        hint.textContent = `计划 ${Math.round(state.plannedSec/60)}m · 已过 ${fmtHMS(elapsedSec())}`;
      }
    }
    if (Math.floor(elapsedSec()) % 15 === 0) updateFocusBar();
    // auto-finish countdown when it hits 0
    if (state.mode === 'countdown' && state.plannedSec && remainingSec() <= 0) {
      finishRun();
    }
  }

  function pauseRun() {
    if (!state || !state.running || state.paused) return;
    state.paused = true;
    state.pausedAt = nowIso();
    save();
    toggleFabLabel();
  }

  function resumeRun() {
    if (!state || !state.running || !state.paused) return;
    if (state.pausedAt) {
      const dt = (Date.now() - new Date(state.pausedAt).getTime()) / 1000;
      state.totalPausedSec = (state.totalPausedSec || 0) + dt;
    }
    state.paused = false;
    state.pausedAt = null;
    save();
    toggleFabLabel();
  }

  function cancelRun() {
    if (!confirm('放弃这次专注？（不会被记入今日利用率）')) return;
    state = null;
    save();
    toggleFabLabel();
    closePanel();
    if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
    updateFocusBar();
  }

  function finishRun() {
    // freeze snapshot
    const snapshot = {
      mode: state.mode,
      plannedSec: state.plannedSec,
      actualSec: Math.round(elapsedSec()),
      startedAt: state.startedAt,
      endedAt: nowIso(),
      preClarity: state.preClarity,
      projectId: state.projectId,
      note: state.note,
      insights: (state.insights || []).slice()
    };
    state = null;
    save();
    toggleFabLabel();
    if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
    openFinishModal(snapshot);
  }

  function openFinishModal(snap) {
    const modal = document.getElementById('ft-modal');
    const projects = (data && data.projects) || [];
    const projOptions = ['<option value="">— 不挂项目 —</option>']
      .concat(projects.map(p => `<option value="${p.id}" ${p.id===snap.projectId?'selected':''}>${escapeHtml(p.name)}</option>`))
      .join('');
    const mins = Math.round(snap.actualSec / 60);
    const insights = snap.insights || [];
    const totalPts = insights.reduce((s,i)=>s+i.points, 0);
    const insightsHtml = insights.length > 0
      ? `<div class="ft-field">
           <div class="label"><span>本次心得</span><span class="val">${insights.length} 条 · 共 +${totalPts}</span></div>
           <div class="ft-insights" style="margin-top:6px">
             <div class="items">${insights.map(it => {
               const proj = projects.find(p => p.id === it.projectId);
               const pName = proj ? proj.name : '无项目';
               return `<div class="item">
                 <span class="txt">${escapeHtml(it.text)}</span>
                 <span class="proj">${escapeHtml(pName)}</span>
                 <span class="pts">+${it.points}</span>
               </div>`;
             }).join('')}</div>
           </div>
         </div>`
      : '';

    modal.innerHTML = `
      <div class="ft-modal-card">
        <div class="ft-modal-head">专注结束 · 填写完成</div>
        <div class="ft-modal-body">
          <div class="ft-session-summary">
            <div><span style="color:var(--text-4)">时段</span> <b>${toTime(snap.startedAt)} – ${toTime(snap.endedAt)}</b></div>
            <div><span style="color:var(--text-4)">时长</span> <b>${fmtHMS(snap.actualSec)}</b> (${mins} 分钟)</div>
            <div><span style="color:var(--text-4)">开始时清晰度</span> <b>${snap.preClarity}</b></div>
            ${snap.note ? `<div><span style="color:var(--text-4)">名称</span> <b>${escapeHtml(snap.note)}</b></div>` : ''}
          </div>
          <div class="ft-field">
            <div class="label"><span>结束时 · 大脑清晰度</span><span class="val" id="ft-post-val">70</span></div>
            <input type="range" class="ft-slider" id="ft-post" min="0" max="100" step="1" value="70" />
          </div>
          <div class="ft-field">
            <div class="label"><span>挂到哪个项目</span></div>
            <select id="ft-m-project">${projOptions}</select>
          </div>
          ${insightsHtml}
          <div class="ft-field">
            <label style="display:flex;gap:8px;align-items:center;font-family:var(--mono);font-size:11.5px;color:var(--text-2);cursor:pointer">
              <input type="checkbox" id="ft-m-entry" checked />
              <span>生成今日明细 entry（心得会作为独立 entry 写入）</span>
            </label>
          </div>
          <div class="ft-actions">
            <button class="ft-btn" data-mact="discard">丢弃</button>
            <button class="ft-btn primary" data-mact="save">保存</button>
          </div>
        </div>
      </div>
    `;
    modal.classList.add('open');
    modal.querySelector('#ft-post').addEventListener('input', (e) => {
      modal.querySelector('#ft-post-val').textContent = e.target.value;
    });
    modal.addEventListener('click', function onClick(ev) {
      const b = ev.target.closest('[data-mact]');
      if (!b) return;
      const act = b.dataset.mact;
      if (act === 'discard') {
        if (!confirm('丢弃这次专注记录？')) return;
        modal.classList.remove('open');
        modal.removeEventListener('click', onClick);
        return;
      }
      if (act === 'save') {
        const post = Number(modal.querySelector('#ft-post').value);
        const pid = modal.querySelector('#ft-m-project').value || null;
        const genEntry = modal.querySelector('#ft-m-entry').checked;
        commitSession({ ...snap, projectId: pid, postClarity: post, genEntry });
        modal.classList.remove('open');
        modal.removeEventListener('click', onClick);
      }
    });
  }

  function commitSession(s) {
    data.today = data.today || {};
    data.today.focus_sessions = data.today.focus_sessions || [];
    data.today.entries = data.today.entries || [];

    const sid = 's_' + new Date(s.startedAt).toISOString().replace(/[-:TZ.]/g,'').slice(0,12);
    const mins = Math.round(s.actualSec / 60);
    const avg = (s.preClarity + s.postClarity) / 2;
    const endTime = toTime(s.endedAt);
    const entryIds = [];

    // 1) Insights → one entry each (hung on its own project, or session project as default)
    if (s.genEntry && Array.isArray(s.insights) && s.insights.length > 0) {
      s.insights.forEach((it, i) => {
        const pid = it.projectId || s.projectId || null;
        if (!pid) return; // skip orphan insights
        const eid = 'e_' + new Date(s.endedAt).toISOString().replace(/[-:TZ.]/g,'').slice(0,12) + '_i' + (i+1);
        entryIds.push(eid);
        data.today.entries.push({
          id: eid,
          time: endTime,
          task: it.text,
          project_id: pid,
          project_delta_pct: 0,
          points: it.points,
          source: 'focus_insight'
        });
      });
    }

    // 2) Base session entry (only if no insights AND has project)
    if (s.genEntry && entryIds.length === 0 && s.projectId) {
      const eid = 'e_' + new Date(s.endedAt).toISOString().replace(/[-:TZ.]/g,'').slice(0,12);
      const pts = Math.max(5, Math.round(mins * (avg / 100) * 3));
      entryIds.push(eid);
      data.today.entries.push({
        id: eid,
        time: endTime,
        task: s.note || `专注 ${mins}min @ 均清晰度 ${Math.round(avg)}`,
        project_id: s.projectId,
        project_delta_pct: 0,
        points: pts,
        source: 'focus_timer'
      });
    }

    const session = {
      id: sid,
      mode: s.mode,
      planned_sec: s.plannedSec || null,
      actual_sec: s.actualSec,
      start_at: s.startedAt,
      end_at: s.endedAt,
      pre_clarity: s.preClarity,
      post_clarity: s.postClarity,
      project_id: s.projectId || null,
      entry_ids: entryIds,
      entry_id_linked: entryIds[0] || null,
      note: s.note || '',
      insights: (s.insights || []).map(it => ({
        id: it.id, text: it.text, points: it.points,
        project_id: it.projectId || null, at: it.at
      }))
    };
    data.today.focus_sessions.push(session);

    // hand new stuff to SyncClient — outbox first (never lose data), then fire async push
    try {
      const addedEntries = entryIds
        .map(id => data.today.entries.find(e => e.id === id))
        .filter(Boolean);
      SyncClient.enqueue([session], addedEntries);
      SyncClient.push();
    } catch (e) { /* SyncClient is a best-effort layer, never block the UI flow */ }

    render(data);
    toggleFabLabel();
    updateFocusBar();
  }

  // ----- FAB drag + persistent position -----
  // Goals:
  //  - iPad Safari default position does not overlap topbar sync-chip
  //    (we already shifted default to bottom:20 right:20; here we let users
  //     drag it anywhere and persist the new spot)
  //  - Drag threshold 6px so normal taps still open the panel
  //  - Pointer Events unify mouse + touch; touch-action:none on .ft-fab
  //  - On viewport resize, clamp stored position back on-screen
  const FAB_POS_KEY = 'lifeflow_fab_pos_v1';

  function clampPos(left, top, fab) {
    const r = fab.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const w = r.width || 56;
    const h = r.height || 36;
    const margin = 4;
    return {
      left: Math.max(margin, Math.min(vw - w - margin, left)),
      top:  Math.max(margin, Math.min(vh - h - margin, top))
    };
  }

  function applyFabPos(fab, left, top) {
    const p = clampPos(left, top, fab);
    fab.style.left = p.left + 'px';
    fab.style.top  = p.top  + 'px';
    fab.style.right  = 'auto';
    fab.style.bottom = 'auto';
  }

  function restoreFabPos(fab) {
    let raw;
    try { raw = localStorage.getItem(FAB_POS_KEY); } catch (e) { return; }
    if (!raw) return;
    let pos;
    try { pos = JSON.parse(raw); } catch (e) { return; }
    if (!pos || typeof pos.left !== 'number' || typeof pos.top !== 'number') return;
    applyFabPos(fab, pos.left, pos.top);
  }

  function saveFabPos(fab) {
    const r = fab.getBoundingClientRect();
    try {
      localStorage.setItem(FAB_POS_KEY, JSON.stringify({
        left: Math.round(r.left),
        top: Math.round(r.top)
      }));
    } catch (e) {}
  }

  function installFabDrag(fab) {
    const THRESHOLD = 6; // px; below this a pointerup is treated as a click
    let startX = null, startY = null, fabStartX = 0, fabStartY = 0;
    let moved = false, pointerId = null;

    function onDown(ev) {
      // don't hijack pointerdown on the running-state ctrl buttons
      if (ev.target && ev.target.closest && ev.target.closest('[data-act]')) return;
      if (pointerId !== null) return; // single active pointer
      try { fab.setPointerCapture(ev.pointerId); } catch (e) {}
      pointerId = ev.pointerId;
      const rect = fab.getBoundingClientRect();
      startX = ev.clientX; startY = ev.clientY;
      fabStartX = rect.left; fabStartY = rect.top;
      moved = false;
      fab._justDragged = false;
    }
    function onMove(ev) {
      if (pointerId == null || ev.pointerId !== pointerId) return;
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      if (!moved) {
        if (Math.abs(dx) < THRESHOLD && Math.abs(dy) < THRESHOLD) return;
        moved = true;
        fab.classList.add('dragging');
      }
      if (ev.cancelable) ev.preventDefault();
      applyFabPos(fab, fabStartX + dx, fabStartY + dy);
    }
    function onUpOrCancel(ev) {
      if (pointerId == null || ev.pointerId !== pointerId) return;
      try { fab.releasePointerCapture(pointerId); } catch (e) {}
      pointerId = null;
      const wasMoved = moved;
      moved = false;
      fab.classList.remove('dragging');
      if (wasMoved) {
        saveFabPos(fab);
        fab._justDragged = true;
        // cleared on next tick so the impending synthetic click is squelched,
        // but a later real click still fires.
        setTimeout(() => { fab._justDragged = false; }, 0);
      }
    }

    fab.addEventListener('pointerdown',  onDown);
    fab.addEventListener('pointermove',  onMove);
    fab.addEventListener('pointerup',    onUpOrCancel);
    fab.addEventListener('pointercancel', onUpOrCancel);
    fab.addEventListener('lostpointercapture', onUpOrCancel);

    // reclamp on viewport change (e.g. iPad rotation, address-bar chrome reflow)
    const reclamp = () => {
      const r = fab.getBoundingClientRect();
      // if inline left/top is set, reclamp; otherwise leave defaults alone
      if (fab.style.left && fab.style.top) applyFabPos(fab, r.left, r.top);
    };
    window.addEventListener('resize', reclamp);
    window.addEventListener('orientationchange', reclamp);
  }

  function init(d, c) {
    data = d; cfg = c;
    load();
    // restore live session if running
    const fab = document.getElementById('ft-fab');
    // restore persisted FAB position (clamped to current viewport) before drag binds
    restoreFabPos(fab);
    installFabDrag(fab);
    fab.addEventListener('click', (ev) => {
      // a drag just ended — squelch the synthetic click that follows pointerup
      if (fab._justDragged) { ev.stopPropagation(); ev.preventDefault(); return; }
      // running-state ctrl buttons take priority; click on them does not open the panel.
      const act = ev.target.closest && ev.target.closest('[data-act]');
      if (act) {
        ev.stopPropagation();
        if (act.dataset.act === 'fab-pause') {
          if (state && state.paused) resumeRun(); else pauseRun();
          return;
        }
        if (act.dataset.act === 'fab-finish') {
          finishRun();
          return;
        }
      }
      const panel = document.getElementById('ft-panel');
      if (panel.classList.contains('open')) closePanel();
      else openPanel();
    });
    const panel = document.getElementById('ft-panel');
    panel.addEventListener('click', onPanelClick);
    panel.addEventListener('input', onPanelInput);
    panel.addEventListener('change', onPanelInput);
    // keyboard activation for role=button divs (name-slot)
    panel.addEventListener('keydown', (ev) => {
      if (ev.key !== 'Enter' && ev.key !== ' ') return;
      const slot = ev.target.closest && ev.target.closest('.name-slot');
      if (!slot || slot.classList.contains('editing')) return;
      if (ev.target !== slot) return; // inner input handles its own keys
      ev.preventDefault();
      beginNameEdit(slot);
    });
    if (state && state.running) {
      if (tickHandle) clearInterval(tickHandle);
      tickHandle = setInterval(tick, 1000);
    }
    toggleFabLabel();
  }

  return { init, getLiveSegment };
})();
</script>
</body>
</html>
