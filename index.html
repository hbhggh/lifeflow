<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="refresh" content="0; url=./Breath.html" />
<link rel="canonical" href="./Breath.html" />
<title>life flow · Breath</title>
<style>
  :root {
    --bg: #f7f6f3;
    --text: #111;
    --text-2: #666;
    --line: #e5e1d8;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #08090d;
      --text: #f4f1ea;
      --text-2: #a9a5a0;
      --line: #272832;
      color-scheme: dark;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  main {
    width: min(100%, 520px);
    padding-top: 18px;
    border-top: 1px solid var(--line);
  }
  h1 {
    margin: 0 0 10px;
    font-size: 24px;
    line-height: 1.2;
    font-weight: 500;
    letter-spacing: 0;
  }
  p {
    margin: 0 0 20px;
    color: var(--text-2);
    font-size: 14px;
    line-height: 1.7;
  }
  a {
    color: var(--text);
    text-underline-offset: 4px;
  }
</style>
</head>

<main>
  <h1>LifeFlow Breath</h1>
  <p>正在进入当前唯一主架构。</p>
